<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app">
    <section class="todo-card">

      <div class="header">
        <div>
          <p class="label">Task Manager</p>
          <h1>To-Do List</h1>
        </div>
        <div class="date-box">
          <span id="tanggal"></span>
        </div>
      </div>

      <div class="stats">
        <div>
          <h3 id="totalTugas">0</h3>
          <p>Total</p>
        </div>
        <div>
          <h3 id="tugasSelesai">0</h3>
          <p>Selesai</p>
        </div>
        <div>
          <h3 id="tugasBelum">0</h3>
          <p>Belum</p>
        </div>
      </div>

      <div class="input-area">
        <input type="text" id="inputTugas" placeholder="Tambahkan tugas baru...">
        <button onclick="tambahTugas()">Tambah</button>
      </div>

      <ul id="daftarTugas"></ul>

      <p id="emptyText" class="empty-text">Belum ada tugas. Tambahkan tugas pertamamu.</p>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
